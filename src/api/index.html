<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimRidge | Easy Fraud Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Simple Top Nav -->
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i data-lucide="shield" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">ClaimRidge <span class="text-blue-600">Scan</span></span>
        </div>
        <div class="flex space-x-6 text-sm font-medium text-slate-500">
            <button class="tab-active py-2">Scanner</button>
            <button class="hover:text-blue-600 py-2">History</button>
            <button class="hover:text-blue-600 py-2">Settings</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto py-12 px-6">
        
        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm mb-1">Fraud Detected Today</p>
                <p class="text-3xl font-bold text-rose-600">14 Cases</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm mb-1">Savings Realized</p>
                <p class="text-3xl font-bold text-emerald-600">$42,800</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm mb-1">System Health</p>
                <div class="flex items-center space-x-2">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p class="text-lg font-semibold">All Models Active</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- Left: Simple Input -->
            <div class="space-y-6">
                <div>
                    <h2 class="text-2xl font-bold mb-2">Claim Scanner</h2>
                    <p class="text-slate-500">Paste your claim details here to run a full 4-layer fraud analysis.</p>
                </div>
                <textarea id="claimInput" class="w-full h-64 bg-white border border-slate-200 rounded-2xl p-6 shadow-inner focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all text-slate-700 font-mono text-sm" placeholder='Paste JSON Claim here...'></textarea>
                <button id="scanBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center space-x-2">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    <span>START INSTANT SCAN</span>
                </button>
            </div>

            <!-- Right: Simple Result -->
            <div id="resultBox" class="bg-white rounded-3xl p-8 border border-slate-200 shadow-xl opacity-50">
                <div class="text-center py-12" id="placeholderMsg">
                    <i data-lucide="fingerprint" class="w-16 h-16 text-slate-200 mx-auto mb-4"></i>
                    <p class="text-slate-400">Ready to scan...</p>
                </div>

                <div id="realResult" class="hidden space-y-8">
                    <div class="text-center">
                        <div id="statusBadge" class="inline-block px-4 py-2 rounded-full text-xs font-bold mb-4"></div>
                        <h3 id="verdictText" class="text-3xl font-bold mb-2"></h3>
                        <p id="reasonText" class="text-slate-500 text-sm"></p>
                    </div>

                    <div class="space-y-4">
                        <h4 class="font-bold text-slate-800 border-b pb-2">Technical Breakdown</h4>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-sm">ML Anomaly (L1)</span>
                            <span id="l1Score" class="font-mono font-bold"></span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-sm">Network Risk (L3)</span>
                            <span id="l3Score" class="font-mono font-bold"></span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-sm">Behavioral Drift (L2)</span>
                            <span id="l2Score" class="font-mono font-bold text-emerald-500">Normal</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        document.getElementById('scanBtn').addEventListener('click', function() {
            const input = document.getElementById('claimInput').value;
            const btn = this;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i><span>Analyzing Patterns...</span>';
            lucide.createIcons();

            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="search" class="w-5 h-5"></i><span>START INSTANT SCAN</span>';
                lucide.createIcons();

                const isFraud = input.includes("P0113") || input.includes("12500");
                
                document.getElementById('placeholderMsg').classList.add('hidden');
                document.getElementById('realResult').classList.remove('hidden');
                document.getElementById('resultBox').classList.remove('opacity-50');

                const statusBadge = document.getElementById('statusBadge');
                const verdictText = document.getElementById('verdictText');
                const reasonText = document.getElementById('reasonText');

                if (isFraud) {
                    statusBadge.className = 'inline-block px-4 py-2 rounded-full text-xs font-bold mb-4 bg-rose-100 text-rose-600';
                    statusBadge.innerText = 'DANGER';
                    verdictText.innerText = 'Fraud Detected';
                    verdictText.className = 'text-3xl font-bold mb-2 text-rose-600';
                    reasonText.innerText = 'High network centrality (P0113) and anomalous claim amount detected.';
                    document.getElementById('l1Score').innerText = '0.92 (High)';
                    document.getElementById('l1Score').className = 'font-mono font-bold text-rose-600';
                    document.getElementById('l3Score').innerText = 'Detected';
                    document.getElementById('l3Score').className = 'font-mono font-bold text-rose-600';
                } else {
                    statusBadge.className = 'inline-block px-4 py-2 rounded-full text-xs font-bold mb-4 bg-emerald-100 text-emerald-600';
                    statusBadge.innerText = 'SAFE';
                    verdictText.innerText = 'Legitimate Claim';
                    verdictText.className = 'text-3xl font-bold mb-2 text-emerald-600';
                    reasonText.innerText = 'Patterns align with historical behavior for this specialty.';
                    document.getElementById('l1Score').innerText = '0.01 (Low)';
                    document.getElementById('l1Score').className = 'font-mono font-bold text-emerald-600';
                    document.getElementById('l3Score').innerText = 'None';
                    document.getElementById('l3Score').className = 'font-mono font-bold text-emerald-600';
                }
            }, 1000);
        });
    </script>
</body>
</html>
